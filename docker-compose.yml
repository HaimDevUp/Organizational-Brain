services:
  postgres:
    image: postgres:16-alpine
    # Host 5433 avoids conflict when local Postgres already uses 5432
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: obos
      POSTGRES_PASSWORD: obos
      POSTGRES_DB: obos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
